<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f0f4f8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="雨雲レーダー" />
  <title>雨雲レーダー</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #0e78dc;
      --warn: #e07b00;
      --danger: #d62b2b;
      --green: #1a9e3f;
      --text: #1a2332;
      --text2: rgba(26,35,50,0.55);
      --panel: rgba(255,255,255,0.96);
      --border: rgba(0,0,0,0.1);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; overflow:hidden; font-family:'Noto Sans JP',sans-serif; color:var(--text); background:#e8f0e8; }

    #map { position:absolute; inset:0; z-index:0; }

    /* 全タイルエラーを非表示 */
    .leaflet-tile-container img[src*="rainviewer"] { display:none; }
    img.leaflet-tile-error,
    img.leaflet-tile[src=""],
    .leaflet-tile-error { visibility:hidden !important; opacity:0 !important; }
    .leaflet-control-attribution { font-size:9px !important; background:rgba(255,255,255,0.7) !important; color:rgba(0,0,0,0.4) !important; }
    .leaflet-control-zoom { display:none !important; }

    /* TOP BAR */
    #topbar {
      position:absolute; top:0; left:0; right:0; z-index:900;
      padding:max(env(safe-area-inset-top),12px) 16px 10px;
      background:linear-gradient(to bottom,rgba(240,244,248,0.97) 70%,transparent);
      display:flex; align-items:center; gap:10px;
    }
    .title-icon {
      width:30px; height:30px;
      background:rgba(14,120,220,0.1); border:1px solid rgba(14,120,220,0.25); border-radius:9px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .title-icon svg { width:16px; height:16px; }
    h1 { font-size:16px; font-weight:700; flex:1; }
    #clock { font-family:'DM Mono',monospace; font-size:13px; color:var(--text2); }

    /* STATUS */
    #status-chip {
      position:absolute; top:62px; left:50%; transform:translateX(-50%);
      z-index:850; background:var(--panel); border:1px solid var(--border);
      border-radius:20px; padding:5px 14px; font-size:12px; color:var(--text2);
      display:flex; align-items:center; gap:6px; backdrop-filter:blur(10px);
      white-space:nowrap; transition:opacity 0.4s;
    }
    #status-chip.hidden { opacity:0; pointer-events:none; }
    .chip-dot { width:6px; height:6px; border-radius:50%; background:#aaa; }
    .chip-dot.blue { background:var(--blue); animation:pulse 1.4s infinite; }
    .chip-dot.green { background:var(--green); }
    .chip-dot.red { background:var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* LEGEND */
    #legend {
      position:absolute; top:68px; left:12px; z-index:800;
      background:var(--panel); border:1px solid var(--border); border-radius:9px;
      padding:7px 10px; backdrop-filter:blur(10px);
    }
    .lg-title { font-size:10px; color:var(--text2); margin-bottom:4px; }
    .lg-bar { width:100px; height:6px; background:linear-gradient(to right,#00ffff,#00ff00,#ffff00,#ff8c00,#ff0000,#9400d3); border-radius:3px; margin-bottom:3px; }
    .lg-labels { display:flex; justify-content:space-between; font-size:9px; color:var(--text2); font-family:'DM Mono',monospace; }

    /* TOAST */
    #toast {
      position:absolute; top:68px; left:16px; right:16px; z-index:1000;
      background:var(--panel); border:1px solid var(--border); border-radius:14px;
      padding:12px 16px; display:flex; align-items:flex-start; gap:10px;
      backdrop-filter:blur(16px); transform:translateY(-20px); opacity:0;
      pointer-events:none; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;
    }
    #toast.show { transform:translateY(0); opacity:1; pointer-events:auto; }
    #toast.warn { border-color:var(--warn); }
    #toast.danger { border-color:var(--danger); }
    .toast-icon { width:22px; height:22px; flex-shrink:0; margin-top:1px; }
    #toast-title { font-size:14px; font-weight:700; margin-bottom:2px; }
    #toast-body { font-size:13px; color:var(--text2); line-height:1.5; }

    /* FAB */
    #fab-area {
      position:absolute; right:14px; bottom:120px;
      display:flex; flex-direction:column; gap:10px; z-index:800;
    }
    .fab {
      width:46px; height:46px; border-radius:13px;
      background:var(--panel); border:1px solid var(--border);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:transform 0.1s; backdrop-filter:blur(12px);
    }
    .fab:active { transform:scale(0.92); }
    .fab svg { width:22px; height:22px; }
    .fab.locating { border-color:var(--blue); }
    .fab.active-notify { border-color:var(--warn); background:rgba(224,123,0,0.1); }

    /* BOTTOM PANEL */
    #bottom-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:900;
      padding-bottom:max(env(safe-area-inset-bottom),10px);
      background:linear-gradient(to top,rgba(240,244,248,0.98) 65%,transparent);
    }

    /* TIMELINE */
    #timeline { padding:10px 14px 4px; overflow-x:auto; scrollbar-width:none; }
    #timeline::-webkit-scrollbar { display:none; }
    #tl-inner { display:flex; gap:3px; align-items:flex-end; min-width:max-content; }

    .tslot {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      cursor:pointer; padding:3px 4px; border-radius:7px; min-width:40px;
      transition:background 0.15s;
    }
    .tslot:active { background:rgba(14,120,220,0.08); }
    .tbar { width:28px; border-radius:3px 3px 0 0; background:rgba(0,0,0,0.1); transition:background 0.15s; }
    .tslot.past .tbar { background:rgba(14,120,220,0.3); }
    .tslot.active .tbar { background:var(--blue) !important; }
    .tslot.forecast .tbar { background:rgba(224,123,0,0.3); }
    .tslot.forecast.active .tbar { background:var(--warn) !important; }
    .ttime { font-size:10px; color:var(--text2); font-family:'DM Mono',monospace; }
    .tslot.active .ttime { color:var(--blue); font-weight:700; }
    .tslot.forecast.active .ttime { color:var(--warn); }

    /* CONTROLS */
    #controls { display:flex; align-items:center; gap:8px; padding:4px 14px 6px; }
    #play-btn {
      width:40px; height:40px; border-radius:50%;
      background:var(--blue); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:transform 0.1s; box-shadow:0 2px 10px rgba(14,120,220,0.3);
    }
    #play-btn:active { transform:scale(0.92); }
    #play-btn svg { width:17px; height:17px; }
    #speed-btn {
      height:28px; padding:0 9px; border-radius:7px;
      background:rgba(0,0,0,0.04); border:1px solid var(--border);
      color:var(--text2); font-size:11px; font-family:'DM Mono',monospace; cursor:pointer;
    }
    #time-display { font-size:13px; font-family:'DM Mono',monospace; color:#0095b3; margin-left:2px; }

    .umark-outer {
      width:18px; height:18px; border-radius:50%; background:rgba(14,120,220,0.18);
      display:flex; align-items:center; justify-content:center; animation:ring 2s infinite;
    }
    .umark-inner { width:10px; height:10px; border-radius:50%; background:var(--blue); border:2px solid white; }
    @keyframes ring { 0%,100%{box-shadow:0 0 0 0 rgba(14,120,220,0.35)} 50%{box-shadow:0 0 0 7px rgba(14,120,220,0)} }
    .spin { animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="title-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0e78dc" stroke-width="2">
      <path d="M20 17.58A5 5 0 0018 8h-1.26A8 8 0 104 16.25"/>
      <line x1="8" y1="16" x2="8" y2="21"/><line x1="8" y1="21" x2="6" y2="21"/>
      <line x1="12" y1="16" x2="12" y2="21"/>
      <line x1="16" y1="16" x2="16" y2="21"/>
    </svg>
  </div>
  <h1>雨雲レーダー</h1>
  <span id="clock">--:--</span>
</div>

<div id="status-chip">
  <div class="chip-dot" id="chip-dot"></div>
  <span id="chip-text">現在地ボタンをタップ</span>
</div>

<div id="legend">
  <div class="lg-title">降水強度</div>
  <div class="lg-bar"></div>
  <div class="lg-labels"><span>弱</span><span>強</span></div>
</div>

<div id="toast">
  <svg class="toast-icon" id="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#e07b00" stroke-width="2">
    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
  <div>
    <div id="toast-title"></div>
    <div id="toast-body"></div>
  </div>
</div>

<div id="fab-area">
  <button class="fab" id="notify-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1a2332" stroke-width="2">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 01-3.46 0"/>
    </svg>
  </button>
  <button class="fab" id="locate-btn">
    <svg id="locate-icon" viewBox="0 0 24 24" fill="none" stroke="#0e78dc" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
  </button>
</div>

<div id="bottom-panel">
  <div id="timeline"><div id="tl-inner"></div></div>
  <div id="controls">
    <button id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <button id="speed-btn">1×</button>
    <span id="time-display">--:--</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── タイルエラーを完全無効化（Leaflet内部を上書き） ──
L.TileLayer.include({
  _tileOnError: function(done, tile, e) {
    tile.style.display = 'none';
    tile.style.visibility = 'hidden';
    done(null, tile); // エラーを無視して続行
  }
});

let map, radarLayer, locationMarker, accuracyCircle;
let userLat=null, userLng=null;
let notifyEnabled=false, notifyInterval=null;
let frames=[], currentFrameIdx=0;
let playing=false, playTimer=null, playSpeed=1;
let toastTimer=null;

// CLOCK
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock,15000);

// MAP
function initMap(lat,lng) {
  if(map){ map.setView([lat,lng],8); return; }
  map = L.map('map',{
    center:[lat,lng], zoom:8,
    minZoom:4, maxZoom:12,
    zoomControl:false, attributionControl:true
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',
    maxZoom:19, maxNativeZoom:19
  }).addTo(map);
  fetchTimeline(lat,lng);
}

// FETCH RAINVIEWER
async function fetchTimeline(lat,lng) {
  try {
    const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const data = await res.json();
    const past = (data.radar.past||[]).slice(-4);
    const nowcast = (data.radar.nowcast||[]).slice(0,2);

    frames = [];
    [...past, ...nowcast].forEach(f=>{
      frames.push({time:f.time, path:f.path, isFuture:nowcast.includes(f), isForecast:false, precip:0});
    });

    // 8時間先まで1時間ごと予測フレーム
    const nowSec = Math.floor(Date.now()/1000);
    for(let h=1;h<=8;h++){
      frames.push({time:nowSec+h*3600, path:null, isFuture:true, isForecast:true, precip:0});
    }

    // 降水量データ（バー用）
    if(lat&&lng){
      try{
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=precipitation&forecast_days=2&timezone=auto`);
        const d = await r.json();
        frames.forEach(f=>{
          const dt = new Date(f.time*1000);
          const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}T${String(dt.getHours()).padStart(2,'0')}:00`;
          const i = d.hourly.time.indexOf(key);
          if(i!==-1) f.precip = d.hourly.precipitation[i]||0;
        });
      }catch(e){}
    }

    buildTimeline();
    setFrame(past.length-1);
  }catch(e){ setChip('red','データ取得失敗'); }
}

// TIMELINE UI
function buildTimeline() {
  const inner = document.getElementById('tl-inner');
  inner.innerHTML='';
  const maxP = Math.max(...frames.map(f=>f.precip),0.5);

  frames.forEach((f,i)=>{
    const slot = document.createElement('div');
    const isForecast = !!f.isForecast;
    const isPast = !f.isFuture;
    slot.className='tslot'+(isPast?' past':'')+(isForecast?' forecast':'');
    const d = new Date(f.time*1000);
    const label = d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    const barH = Math.max(5,Math.round((f.precip/maxP)*30));
    slot.innerHTML=`<div class="tbar" style="height:${barH}px"></div><div class="ttime">${label}</div>`;
    slot.addEventListener('click',()=>{setFrame(i);stopPlay();});
    inner.appendChild(slot);
  });
  updateTLActive();
  scrollToActive();
}

function updateTLActive(){
  document.querySelectorAll('.tslot').forEach((el,i)=>el.classList.toggle('active',i===currentFrameIdx));
}
function scrollToActive(){
  const a=document.querySelector('.tslot.active');
  if(a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// SET FRAME
function setFrame(idx){
  currentFrameIdx=Math.max(0,Math.min(frames.length-1,idx));
  updateTLActive();
  renderRadar();
  updateTimeDisplay();
}

function updateTimeDisplay(){
  const f=frames[currentFrameIdx];
  const lbl=document.getElementById('time-display');
  if(!f){lbl.textContent='--:--';return;}
  const d=new Date(f.time*1000);
  const t=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  lbl.textContent=f.isForecast?t+' 予測':t;
  lbl.style.color=f.isForecast?'#e07b00':'#0095b3';
}

// RADAR — ImageOverlay方式（タイルエラーなし）
function renderRadar(){
  if(!map) return;
  if(radarLayer){map.removeLayer(radarLayer);radarLayer=null;}
  const f=frames[currentFrameIdx];
  if(!f||!f.path) return;

  // RainViewerをImageOverlayとして使用
  // 日本全域をカバーするbounds
  const bounds = [[20,122],[48,150]];
  const zoom = 4; // 固定ズームでタイル取得
  const url = `https://tilecache.rainviewer.com${f.path}/512/4/13/6/2/1_1.png`;

  // TileLayerではなくImageOverlayを使うことでズームエラーを完全回避
  // ただしRainViewerはタイル形式なのでL.tileLayerを使いつつ
  // ズームを気にしない設定にする
  radarLayer = L.tileLayer(
    `https://tilecache.rainviewer.com${f.path}/256/{z}/{x}/{y}/2/1_1.png`,
    {
      opacity: 0.7,
      tileSize: 256,
      zIndex: 10,
      // ズームに関係なく常に同じタイルを表示（エラーなし）
      maxNativeZoom: 6,
      maxZoom: 18,
      minZoom: 0,
    }
  ).addTo(map);
}

// PLAYBACK
const SPEEDS=[1,2,4];
function togglePlay(){playing?stopPlay():startPlay();}
function startPlay(){
  playing=true;updatePlayBtn();
  playTimer=setInterval(()=>{
    setFrame(currentFrameIdx>=frames.length-1?0:currentFrameIdx+1);
    scrollToActive();
  },700/playSpeed);
}
function stopPlay(){playing=false;clearInterval(playTimer);updatePlayBtn();}
function updatePlayBtn(){
  document.getElementById('play-icon').innerHTML=playing
    ?'<rect x="5" y="3" width="4" height="18" fill="white"/><rect x="15" y="3" width="4" height="18" fill="white"/>'
    :'<polygon points="5,3 19,12 5,21" fill="white"/>';
}
document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('speed-btn').addEventListener('click',()=>{
  playSpeed=SPEEDS[(SPEEDS.indexOf(playSpeed)+1)%SPEEDS.length];
  document.getElementById('speed-btn').textContent=playSpeed+'×';
  if(playing){stopPlay();startPlay();}
});

// LOCATE
document.getElementById('locate-btn').addEventListener('click',locate);
function locate(){
  if(!navigator.geolocation){showToast('warn','非対応','位置情報に対応していません');return;}
  setChip('blue','現在地を取得中...');
  document.getElementById('locate-btn').classList.add('locating');
  document.getElementById('locate-icon').classList.add('spin');
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    document.getElementById('locate-btn').classList.remove('locating');
    document.getElementById('locate-icon').classList.remove('spin');
    initMap(userLat,userLng);
    placeMarker(userLat,userLng,pos.coords.accuracy);
    setChip('green',`${userLat.toFixed(4)}, ${userLng.toFixed(4)}`);
    setTimeout(()=>document.getElementById('status-chip').classList.add('hidden'),4000);
  },err=>{
    document.getElementById('locate-btn').classList.remove('locating');
    document.getElementById('locate-icon').classList.remove('spin');
    const msgs={1:'位置情報が拒否されました',2:'取得できません',3:'タイムアウト'};
    setChip('red',msgs[err.code]||'エラー');
  },{enableHighAccuracy:true,timeout:12000,maximumAge:60000});
}

function placeMarker(lat,lng,acc){
  if(locationMarker){map.removeLayer(locationMarker);map.removeLayer(accuracyCircle);}
  locationMarker=L.marker([lat,lng],{icon:L.divIcon({
    className:'',html:'<div class="umark-outer"><div class="umark-inner"></div></div>',
    iconSize:[18,18],iconAnchor:[9,9]
  })}).addTo(map);
  accuracyCircle=L.circle([lat,lng],{radius:acc,color:'#0e78dc',weight:1,opacity:0.3,fillColor:'#0e78dc',fillOpacity:0.05}).addTo(map);
}

// NOTIFY
document.getElementById('notify-btn').addEventListener('click',toggleNotify);
function toggleNotify(){
  if(notifyEnabled){
    notifyEnabled=false;clearInterval(notifyInterval);
    document.getElementById('notify-btn').classList.remove('active-notify');
    document.getElementById('notify-btn').querySelector('svg').setAttribute('stroke','#1a2332');
    showToast('info','通知オフ','雨雲接近アラートを無効にしました');return;
  }
  if(!userLat){showToast('warn','先に現在地を取得','📍ボタンで現在地を取得してください');return;}
  Notification.requestPermission().then(()=>{
    notifyEnabled=true;
    document.getElementById('notify-btn').classList.add('active-notify');
    document.getElementById('notify-btn').querySelector('svg').setAttribute('stroke','#e07b00');
    showToast('success','通知オン','雨雲が近づいたらアラートします');
    checkRain();notifyInterval=setInterval(checkRain,3*60*1000);
  });
}
async function checkRain(){
  if(!notifyEnabled||!userLat)return;
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userLat}&longitude=${userLng}&hourly=precipitation&forecast_days=1&timezone=auto`);
    const d=await r.json();const now=new Date();let max=0;
    d.hourly.time.forEach((t,i)=>{const diff=(new Date(t)-now)/3600000;if(diff>=0&&diff<=2)max=Math.max(max,d.hourly.precipitation[i]);});
    if(max>0.2){
      const label=max>5?'強い雨':max>1?'雨':'小雨';
      showToast(max>5?'danger':'warn',`☔ ${label}が近づいています`,`2時間以内に約${max.toFixed(1)}mm/h予想`);
      if(Notification.permission==='granted')new Notification('雨雲レーダー',{body:`${label}（${max.toFixed(1)}mm/h予想）`});
    }
  }catch(e){}
}

// CHIP / TOAST
function setChip(dot,text){
  document.getElementById('chip-dot').className='chip-dot'+(dot?' '+dot:'');
  document.getElementById('chip-text').textContent=text;
  document.getElementById('status-chip').classList.remove('hidden');
}
function showToast(type,title,body){
  const t=document.getElementById('toast');
  const c={warn:'#e07b00',danger:'#d62b2b',success:'#1a9e3f',info:'#0e78dc'};
  document.getElementById('toast-icon').setAttribute('stroke',c[type]||'#0e78dc');
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-body').textContent=body;
  t.className='show'+(type==='warn'?' warn':type==='danger'?' danger':'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),5000);
}
document.getElementById('toast').addEventListener('click',()=>document.getElementById('toast').classList.remove('show'));

// INIT
initMap(35.6812,139.7671);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>
</html>
